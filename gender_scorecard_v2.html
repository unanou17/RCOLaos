<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNCT-SWAP Gender Equality Scorecard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --exceeds: #1d4e89;
    --exceeds-bg: #dbeafe;
    --exceeds-mid: #60a5fa;
    --meets: #2d6a4f;
    --meets-bg: #d8f3dc;
    --meets-mid: #52b788;
    --approaches: #92400e;
    --approaches-bg: #fef3c7;
    --approaches-mid: #f59e0b;
    --missing: #7f1d1d;
    --missing-bg: #fee2e2;
    --missing-mid: #f87171;
    --not-assessed: #374151;
    --not-assessed-bg: #f3f4f6;
    --not-assessed-mid: #9ca3af;
    --bg: #fafaf8;
    --surface: #ffffff;
    --border: #e8e4df;
    --text: #1a1614;
    --text-muted: #6b6560;
    --accent: #8b5e3c;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    background: #1a1614;
    color: #fff;
    padding: 0 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    border-bottom: 3px solid var(--accent);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .site-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    letter-spacing: 0.02em;
    color: #fff;
  }
  .header-badge {
    background: var(--accent);
    color: #fff;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 2px;
  }
  .refresh-btn {
    background: transparent;
    color: #fff;
    border: 1.5px solid var(--accent);
    padding: 5px 14px;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .refresh-btn:hover:not(:disabled) {
    background: var(--accent);
  }
  .refresh-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, #1a1614 60%, #3d2b1f 100%);
    color: #fff;
    padding: 4rem 2rem 3rem;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 1;
  }
  .hero-inner { max-width: 1100px; margin: 0 auto; position: relative; }
  .hero-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #c8a882;
    margin-bottom: 1rem;
  }
  .hero h2 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 4vw, 3.2rem);
    line-height: 1.1;
    margin-bottom: 0.75rem;
  }
  .hero p {
    color: #b0a89c;
    font-size: 1rem;
    max-width: 600px;
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }
  .hero-cta {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--accent);
    color: #fff;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    padding: 9px 20px;
    border-radius: 6px;
    text-decoration: none;
    margin-bottom: 2.5rem;
    transition: background 0.15s, transform 0.15s;
  }
  .hero-cta:hover {
    background: #7a5134;
    transform: translateY(-1px);
  }

  /* SUMMARY CARDS */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-top: 0;
  }
  .summary-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 1.2rem 1.4rem;
    position: relative;
    overflow: hidden;
  }
  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .summary-card.exceeds::before { background: var(--exceeds-mid); }
  .summary-card.meets::before { background: var(--meets-mid); }
  .summary-card.approaches::before { background: var(--approaches-mid); }
  .summary-card.missing::before { background: var(--missing-mid); }
  .summary-num {
    font-family: 'DM Serif Display', serif;
    font-size: 2.8rem;
    line-height: 1;
    margin-bottom: 0.25rem;
  }
  .summary-card.exceeds .summary-num { color: var(--exceeds-mid); }
  .summary-card.meets .summary-num { color: var(--meets-mid); }
  .summary-card.approaches .summary-num { color: var(--approaches-mid); }
  .summary-card.missing .summary-num { color: var(--missing-mid); }
  .summary-label { font-size: 0.8rem; color: #b0a89c; font-weight: 500; }

  /* MAIN CONTENT */
  .main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

  /* SECTION HEADERS */
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
    align-items: center;
  }
  .filter-label { font-size: 0.8rem; font-weight: 500; color: var(--text-muted); margin-right: 0.25rem; }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 99px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
  .filter-btn.active.exceeds { background: var(--exceeds); border-color: var(--exceeds); }
  .filter-btn.active.meets { background: var(--meets); border-color: var(--meets); }
  .filter-btn.active.approaches { background: #b45309; border-color: #b45309; }
  .filter-btn.active.missing { background: var(--missing); border-color: var(--missing); }

  /* INDICATOR CARDS */
  .dimensions-grid {
    display: flex;
    flex-direction
