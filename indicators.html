<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNCT-SWAP — All Performance Indicators</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --exceeds: #1d4e89;    --exceeds-bg: #dbeafe;  --exceeds-mid: #60a5fa;
    --meets: #2d6a4f;      --meets-bg: #d8f3dc;    --meets-mid: #52b788;
    --approaches: #92400e; --approaches-bg: #fef3c7; --approaches-mid: #f59e0b;
    --missing: #7f1d1d;    --missing-bg: #fee2e2;  --missing-mid: #f87171;
    --not-assessed: #374151; --not-assessed-bg: #f3f4f6; --not-assessed-mid: #9ca3af;
    --bg: #fafaf8; --surface: #ffffff; --border: #e8e4df;
    --text: #1a1614; --text-muted: #6b6560; --accent: #009EDB;
    --header-h: 60px; --filter-h: 0px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); }

  /* ── HEADER ── */
  .site-header {
    background: #1a1f2b; color: #fff; padding: 0 2rem;
    position: sticky; top: 0; z-index: 200;
    display: flex; align-items: center; justify-content: space-between;
    height: var(--header-h); border-bottom: 3px solid var(--accent);
  }
  .header-left { display: flex; align-items: center; gap: 0.9rem; }
  .header-logo { height: 38px; width: auto; display: block; }
  .header-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
  .site-header h1 { font-family: 'Lato', sans-serif; font-weight: 700; font-size: 1.02rem; letter-spacing: 0.01em; }
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .header-badge { background: var(--accent); color: #fff; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 12px; border-radius: 2px; }
  .back-home-link {
    display: inline-flex; align-items: center; gap: 0.3rem;
    color: #fff; text-decoration: none;
    font-size: 0.78rem; font-weight: 600; letter-spacing: 0.02em;
    border: 1.5px solid var(--accent); border-radius: 4px;
    padding: 5px 14px; transition: background 0.15s, color 0.15s;
  }
  .back-home-link:hover { background: var(--accent); color: #fff; }

  /* ── PAGE HERO ── */
  .page-hero {
    background: linear-gradient(135deg, #1a1f2b 55%, #00557a 100%);
    color: #fff; padding: 2.5rem 2rem 2rem; position: relative; overflow: hidden;
  }
  .page-hero::before {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .page-hero-inner { max-width: 1100px; margin: 0 auto; position: relative; }
  .page-hero-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #7fd4f0; margin-bottom: 0.5rem; }
  .page-hero h2 { font-family: 'Lato', sans-serif; font-size: clamp(1.6rem, 3vw, 2.4rem); line-height: 1.1; margin-bottom: 0.5rem; }
  .page-hero-sub { color: #b0a89c; font-size: 0.9rem; }

  /* KPI SUMMARY CARDS */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-top: 1.75rem;
  }
  .summary-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 1.1rem 1.3rem;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    text-align: left;
    width: 100%;
    font-family: 'Roboto', sans-serif;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  }
  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .summary-card.exceeds::before { background: var(--exceeds-mid); }
  .summary-card.meets::before { background: var(--meets-mid); }
  .summary-card.approaches::before { background: var(--approaches-mid); }
  .summary-card.missing::before { background: var(--missing-mid); }
  .summary-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    border-color: rgba(255,255,255,0.22);
  }
  .summary-card.selected {
    border-color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.12);
  }
  .summary-num {
    font-family: 'Lato', sans-serif;
    font-size: 2.6rem;
    line-height: 1;
    margin-bottom: 0.2rem;
  }
  .summary-card.exceeds .summary-num { color: var(--exceeds-mid); }
  .summary-card.meets .summary-num { color: var(--meets-mid); }
  .summary-card.approaches .summary-num { color: var(--approaches-mid); }
  .summary-card.missing .summary-num { color: var(--missing-mid); }
  .summary-label { font-size: 0.8rem; color: #b0a89c; font-weight: 500; }

  /* ── STICKY FILTER BAR ── */
  .filter-bar-wrap {
    background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: var(--header-h); z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .filter-bar-inner {
    max-width: 1100px; margin: 0 auto;
    padding: 0.9rem 2rem; display: flex; flex-direction: column; gap: 0.65rem;
  }
  .filter-row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
  .filter-row-label {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-muted);
    min-width: 80px; flex-shrink: 0;
  }
  .chip {
    padding: 5px 13px; border-radius: 99px;
    border: 1.5px solid var(--border);
    background: var(--surface); font-family: 'Roboto', sans-serif;
    font-size: 0.78rem; font-weight: 500; cursor: pointer;
    color: var(--text-muted); transition: all 0.15s;
    display: flex; align-items: center; gap: 0.35rem;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: #1a1614; color: #fff; border-color: #1a1614; }
  .chip.active.exceeds  { background: var(--exceeds);    border-color: var(--exceeds); }
  .chip.active.meets    { background: var(--meets);      border-color: var(--meets); }
  .chip.active.approaches { background: #b45309;         border-color: #b45309; }
  .chip.active.missing  { background: var(--missing);    border-color: var(--missing); }
  .chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .chip-dot.exceeds   { background: var(--exceeds-mid); }
  .chip-dot.meets     { background: var(--meets-mid); }
  .chip-dot.approaches { background: var(--approaches-mid); }
  .chip-dot.missing   { background: var(--missing-mid); }
  .filter-meta {
    display: flex; align-items: center; justify-content: space-between;
    gap: 1rem; padding: 0.3rem 0 0;
  }
  .filter-count { font-size: 0.78rem; color: var(--text-muted); }
  .filter-count strong { color: var(--text); }
  .clear-btn {
    font-size: 0.75rem; font-weight: 600; color: var(--accent);
    background: none; border: none; cursor: pointer;
    padding: 0; display: none;
  }
  .clear-btn.visible { display: block; }
  .clear-btn:hover { text-decoration: underline; }

  /* ── MAIN ── */
  .main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem 5rem; }

  /* ── DIMENSION GROUP ── */
  .dim-section { margin-bottom: 3rem; }
  .dim-section-header {
    display: flex; align-items: center; gap: 0.75rem;
    margin-bottom: 1.5rem; padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--border);
  }
  .dim-section-name {
    font-family: 'Lato', sans-serif; font-size: 1.35rem; line-height: 1;
  }
  .dim-section-badges { display: flex; gap: 0.4rem; margin-left: auto; flex-shrink: 0; }

  /* ── INDICATOR DETAIL CARD ── */
  .indicator-detail {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 1.25rem; overflow: hidden;
    scroll-margin-top: calc(var(--header-h) + 80px);
    transition: box-shadow 0.15s;
  }
  .ind-header {
    padding: 1.4rem 1.75rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 1rem; flex-wrap: wrap;
  }
  .ind-header-left { flex: 1; min-width: 0; }
  .ind-pi-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.3rem; }
  .ind-title { font-family: 'Lato', sans-serif; font-size: 1.25rem; line-height: 1.25; margin-bottom: 0.45rem; }
  .ind-summary { font-size: 0.86rem; color: var(--text-muted); line-height: 1.6; max-width: 580px; }
  
  /* Status, Year, Dots Right side */
  .ind-header-right { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
  .history-dots { display: flex; gap: 5px; margin-bottom: 0.6rem; justify-content: flex-end; }
  .h-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--not-assessed-bg); border: 1px solid rgba(0,0,0,0.05); }
  .h-dot.exceeds { background: var(--exceeds-mid); }
  .h-dot.meets { background: var(--meets-mid); }
  .h-dot.approaches { background: var(--approaches-mid); }
  .h-dot.missing { background: var(--missing-mid); }

  .status-pill { font-size: 0.72rem; font-weight: 600; padding: 5px 14px; border-radius: 99px; letter-spacing: 0.03em; white-space: nowrap; margin-bottom: 0.4rem;}
  .pill-exceeds    { background: var(--exceeds-bg);    color: var(--exceeds); }
  .pill-meets      { background: var(--meets-bg);      color: var(--meets); }
  .pill-approaches { background: var(--approaches-bg); color: var(--approaches); }
  .pill-missing    { background: var(--missing-bg);    color: var(--missing); }
  .pill-not-assessed { background: var(--not-assessed-bg); color: var(--not-assessed); }
  
  .ind-year { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; text-align: right; }

  /* criteria */
  .criteria-section { padding: 1.5rem 1.75rem; }
  .criteria-title { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1rem; }
  .criteria-levels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.85rem; }
  .criteria-level { border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .criteria-level-header { padding: 0.55rem 0.9rem; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .level-approaches .criteria-level-header { background: var(--approaches-bg); color: var(--approaches); }
  .level-meets      .criteria-level-header { background: var(--meets-bg);      color: var(--meets); }
  .level-exceeds    .criteria-level-header { background: var(--exceeds-bg);    color: var(--exceeds); }
  .criteria-list { padding: 0.8rem 0.9rem; list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
  .criteria-item { display: flex; gap: 0.55rem; align-items: flex-start; font-size: 0.81rem; line-height: 1.5; }
  .criteria-check { width: 17px; height: 17px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.62rem; font-weight: 700; margin-top: 1px; }
  .check-met   { background: var(--exceeds-bg); color: var(--exceeds); }
  .check-unmet { background: #f3f4f6; color: #9ca3af; border: 1px solid #e5e7eb; }

  /* empty state */
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
  .empty-state h3 { font-family: 'Lato', sans-serif; font-size: 1.4rem; margin-bottom: 0.5rem; color: var(--text); }
  .empty-clear { margin-top: 1.2rem; display: inline-block; font-size: 0.85rem; font-weight: 600; color: var(--accent); cursor: pointer; text-decoration: underline; }

  footer { text-align: center; padding: 2rem; font-size: 0.75rem; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 2rem; }

  @media (max-width: 700px) {
    .site-header { padding: 0 1rem; }
    .header-divider, .site-header h1 { display: none; }
    .header-logo { height: 32px; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
    .summary-num { font-size: 2.1rem; }
    .criteria-levels { grid-template-columns: 1fr; }
    .filter-bar-inner { padding: 0.75rem 1rem; }
    .main { padding: 1.5rem 1rem 4rem; }
    .ind-header { padding: 1.1rem; flex-direction: column; }
    .ind-header-right { align-items: flex-start; width: 100%; margin-top: 10px; }
    .history-dots { justify-content: flex-start; }
    .ind-year { text-align: left; }
    .criteria-section { padding: 1.1rem; }
    .filter-row-label { min-width: 60px; font-size: 0.65rem; }
    .dim-section-badges { display: none; }
  }

  /* LARGE SCREENS */
  @media (min-width: 1600px) {
    html { font-size: 112.5%; }
    .page-hero-inner, .filter-bar-inner, .main { max-width: 1320px; }
  }
  @media (min-width: 2000px) {
    html { font-size: 125%; }
    .page-hero-inner, .filter-bar-inner, .main { max-width: 1480px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <img src="un_logo_lao.png" alt="United Nations Lao PDR" class="header-logo">
    <span class="header-divider"></span>
    <h1>UNCT-SWAP Gender Equality Scorecard</h1>
    <span class="header-badge">Lao PDR</span>
  </div>
  <div class="header-right">
    <a href="gender_scorecard_v2.html" class="back-home-link">← Back to home</a>
  </div>
</header>

<section class="page-hero">
  <div class="page-hero-inner">
    <div class="page-hero-label">Performance Indicators</div>
    <h2>All 15 Indicators</h2>
    <p class="page-hero-sub">7 dimensions · assessed 2022–2025 · click a card or use the filters below</p>
    <div class="summary-grid" id="summary-grid"></div>
  </div>
</section>

<div class="filter-bar-wrap" id="filter-bar-wrap">
  <div class="filter-bar-inner">
    <div class="filter-row">
      <span class="filter-row-label">Dimension</span>
      <button class="chip active" data-dim="all" onclick="setDimFilter('all', this)">All</button>
      <button class="chip" data-dim="1" onclick="setDimFilter('1', this)">1 · Planning</button>
      <button class="chip" data-dim="2" onclick="setDimFilter('2', this)">2 · Programming</button>
      <button class="chip" data-dim="3" onclick="setDimFilter('3', this)">3 · Partnerships</button>
      <button class="chip" data-dim="4" onclick="setDimFilter('4', this)">4 · Leadership</button>
      <button class="chip" data-dim="5" onclick="setDimFilter('5', this)">5 · Gender Arch.</button>
      <button class="chip" data-dim="6" onclick="setDimFilter('6', this)">6 · Financial</button>
      <button class="chip" data-dim="7" onclick="setDimFilter('7', this)">7 · Results</button>
    </div>
    <div class="filter-row" id="status-filter-row">
      <span class="filter-row-label">Status</span>
      <button class="chip active" data-status="all" onclick="setStatusFilter('all', this)">All</button>
      <button class="chip" data-status="exceeds" onclick="setStatusFilter('exceeds', this)">
        <span class="chip-dot exceeds"></span><span id="chip-count-exceeds">Exceeds</span>
      </button>
      <button class="chip" data-status="meets" onclick="setStatusFilter('meets', this)">
        <span class="chip-dot meets"></span><span id="chip-count-meets">Meets</span>
      </button>
      <button class="chip" data-status="approaches" onclick="setStatusFilter('approaches', this)">
        <span class="chip-dot approaches"></span><span id="chip-count-approaches">Approaches</span>
      </button>
      <button class="chip" data-status="missing" onclick="setStatusFilter('missing', this)">
        <span class="chip-dot missing"></span><span id="chip-count-missing">Missing</span>
      </button>
    </div>
    <div class="filter-meta">
      <span class="filter-count" id="filter-count">Showing <strong>15</strong> of 15 indicators</span>
      <button class="clear-btn" id="clear-btn" onclick="clearFilters()">Clear filters ✕</button>
    </div>
  </div>
</div>

<main class="main" id="main-content"></main>

<footer>UNCT-SWAP Gender Equality Scorecard · Lao PDR · Data current as of 2025</footer>

<script>
// ── LIVE GOOGLE SHEETS URLS ──────────────────────────────────────────────────
const INDICATORS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT5D74_R96HAQ4Ey4Mq66at1-SGNOYIhfJhCa4pZKTXoVHdHzkye06B66Ku7UoTunbkaW6tRUnSbYqj/pub?gid=1057654280&single=true&output=csv";
const CRITERIA_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT5D74_R96HAQ4Ey4Mq66at1-SGNOYIhfJhCa4pZKTXoVHdHzkye06B66Ku7UoTunbkaW6tRUnSbYqj/pub?gid=1207552157&single=true&output=csv";

// Data objects that will be populated by the fetch
let INDICATORS = [];

const PI_META = {
  "PI 1.1": { title: "Common Country Analysis Integrates Gender Analysis", summary: "The CCA must embed substantive gender analysis across its sections, using sex-disaggregated data and examining root causes of gender inequality — including for those furthest behind. This document underpins all UN programming in-country.", criteria: [] },
  "PI 1.2": { title: "Gender Equality Mainstreamed in UNSDCF Outcomes", summary: "The UNSDCF outcomes must reflect a commitment to gender equality either by mainstreaming GEWE across all outcomes or by including at least one dedicated gender equality outcome.", criteria: [] },
  "PI 1.3": { title: "UNSDCF Indicators Measure Changes in Gender Equality", summary: "The results framework needs enough gender-sensitive indicators to meaningfully track GEWE progress across the UNSDCF cycle. Without these, gender results become invisible in M&E.", criteria: [] },
  "PI 2.1": { title: "Joint Programmes Contribute to Reducing Gender Inequalities", summary: "All UN joint programmes should visibly mainstream gender equality, and at least one JP should specifically target GEWE. A system-level mechanism is required to exceed requirements.", criteria: [] },
  "PI 2.2": { title: "Communication & Advocacy Address Areas of Gender Inequality", summary: "The UNCT must visibly and jointly advocate for gender equality — through shared campaigns, a GEWE-inclusive UNCG strategy, and outreach into non-traditional thematic areas.", criteria: [] },
  "PI 2.3": { title: "UNSDCF Monitoring, Evaluation & Learning Measures Gender Equality Results", summary: "The UN's monitoring system must actively track gender equality results — collecting gender-sensitive data, integrating GEWE into reviews, and building M&E staff capacity.", criteria: [] },
  "PI 3.1": { title: "UNCT Collaborates with Government on Gender Equality", summary: "The UNCT must engage the national women's machinery and at least two government entities in joint gender initiatives, and actively support government participation in gender-related SDG implementation.", criteria: [] },
  "PI 3.2": { title: "UNCT Collaborates with Women's/GEWE Civil Society Organisations", summary: "Women's rights organisations are essential partners. This indicator tracks whether GEWE CSOs are engaged jointly on programmes, in UNSDCF design, and in gender-related SDG implementation.", criteria: [] },
  "PI 4.1": { title: "UNCT Leadership is Committed to Championing Gender Equality", summary: "Measures visible commitment of UN leadership — including the RC and Heads of Agencies — to gender equality in both public forums and internal management.", criteria: [] },
  "PI 4.2": { title: "Organizational Culture Supports Promotion of Gender Equality", summary: "Assessed through an annual inter-agency staff perception survey — captures whether UN personnel feel their workplace genuinely supports gender equality promotion.", criteria: [] },
  "PI 4.3": { title: "Gender Parity in Staffing is Achieved", summary: "A system-wide parity plan, appointed gender focal points, and demonstrated progress are the building blocks. This remains the most persistently low-scoring indicator — no parity plan or focal point in place.", criteria: [] },
  "PI 5.1": { title: "Gender Coordination Mechanism is Empowered to Influence the UNCT", summary: "The Gender Thematic Group (GTG) must be formally structured, senior-led, and actively engaged in UNSDCF processes. This indicator made the biggest leap in 2025 — Missing to Exceeds.", criteria: [] },
  "PI 5.2": { title: "UNCT has Adequate Capacities for Gender Mainstreaming", summary: "Regular inter-agency gender training, a capacity development plan, and GEWE-inclusive induction materials ensure UN staff have the knowledge to mainstream gender. Currently no capacity plan or GEWE induction content in place.", criteria: [] },
  "PI 6.1": { title: "Adequate Resources for Gender Mainstreaming are Allocated and Tracked", summary: "All sub-outputs in Joint Work Plans must be coded using the UNCT Gender Equality Marker (GEM), with at least one training event. Meeting the global 70% financial target is required to move beyond Approaches.", criteria: [] },
  "PI 7.1": { title: "UN Programmes Make a Significant Contribution to Gender Equality Results", summary: "The ultimate question: are gender equality results actually being achieved? Requires evidence of on-track delivery across all planned GEWE outcomes — and transformative change in at least one to exceed.", criteria: [] }
};

// ── FETCH & PARSE DATA ───────────────────────────────────────────────────────
async function loadData() {
  try {
    // 1. Fetch Indicators Data
    const indRes  = await fetch(INDICATORS_CSV_URL);
    const indText = await indRes.text();
    const indParsed = Papa.parse(indText, { header: false, skipEmptyLines: true }).data;
    
    // Using .trim() avoids matching issues if a cell has an accidental space
    INDICATORS = indParsed
      .filter(r => r[1] && String(r[1]).trim().match(/^PI \d/))
      .map(r => ({
        dimension: String(r[0] || '').trim(), 
        pi_id: String(r[1] || '').trim(), 
        indicator_name: String(r[2] || '').trim(),
        status_2022: String(r[3] || '').trim(), 
        status_2023: String(r[4] || '').trim(), 
        status_2024: String(r[5] || '').trim(), 
        status_2025: String(r[6] || '').trim(),
        latest_status: String(r[7] || '').trim(), 
        last_assessed: String(r[8] || '').trim(), 
        agency: String(r[9] || '').trim()
      }));

    // 2. Fetch Criteria Data
    const critRes = await fetch(CRITERIA_CSV_URL);
    const critText = await critRes.text();
    const critParsed = Papa.parse(critText, { header: true, skipEmptyLines: true }).data;
    
    // Reset Criteria
    Object.keys(PI_META).forEach(id => {
      if (PI_META[id]) PI_META[id].criteria = [];
    });

    if (critParsed && critParsed.length > 0) {
      critParsed.forEach(row => {
         const keys = Object.keys(row);
         // Find column keys dynamically to handle weird invisible BOM characters or spaces from Google Sheets
         const getVal = (searchStr) => {
            const matchedKey = keys.find(k => k.replace(/^\uFEFF/, '').trim() === searchStr);
            return matchedKey ? String(row[matchedKey] || '').trim() : null;
         };
         
         const id = getVal("PI ID");
         if (!id || !PI_META[id]) return; 
         
         const levelText = getVal("Level");
         const criterionLetter = getVal("Criterion");
         const critText = getVal("Criterion Text");
         
         // Dynamically find the Met column regardless of the exact naming in the Sheet
         const metKey = keys.find(k => k.toLowerCase().includes('met'));
         const isMetStr = metKey ? String(row[metKey] || "").trim().toUpperCase() : "FALSE";
         
         if (levelText && critText) {
            const formattedText = criterionLetter ? `(${criterionLetter}) ${critText}` : critText;
            PI_META[id].criteria.push({
               level: levelText,
               text: formattedText,
               met: (isMetStr === 'TRUE' || isMetStr === '1' || isMetStr === 'YES')
            });
         }
      });
    }
  } catch(e) {
    console.error("Failed to load data from Google Sheets links.", e);
  }
  
  render();
  readUrlParams();
}

// ── RENDER & FILTER LOGIC ────────────────────────────────────────────────────
let activeDim = 'all';
let activeStatus = 'all';

// Helper for status pill and dot colors
function getStatusClass(statusText) {
    if (!statusText) return 'not-assessed';
    const s = statusText.toLowerCase();
    if (s.includes('exceeds')) return 'exceeds';
    if (s.includes('meets')) return 'meets';
    if (s.includes('approaches')) return 'approaches';
    if (s.includes('missing')) return 'missing';
    return 'not-assessed';
}

function render() {
  const grid = document.getElementById('summary-grid');
  const main = document.getElementById('main-content');
  if (!grid || !main) return;

  grid.innerHTML = ''; main.innerHTML = '';

  const filtered = INDICATORS.filter(ind => {
    const dMatch = (activeDim === 'all' || ind.pi_id.startsWith(`PI ${activeDim}`));
    const sMatch = (activeStatus === 'all' || (ind.latest_status && ind.latest_status.toLowerCase().includes(activeStatus.toLowerCase())));
    return dMatch && sMatch;
  });

  document.getElementById('filter-count').innerHTML = `Showing <strong>${filtered.length}</strong> of ${INDICATORS.length} indicators`;
  const clearBtn = document.getElementById('clear-btn');
  if (activeDim !== 'all' || activeStatus !== 'all') clearBtn.classList.add('visible');
  else clearBtn.classList.remove('visible');

  if (filtered.length === 0) {
    main.innerHTML = `<div class="empty-state">
      <h3>No indicators found</h3>
      <p>Try adjusting your dimension or status filters.</p>
      <span class="empty-clear" onclick="clearFilters()">Clear filters</span>
    </div>`;
    return;
  }

  const statusCounts = { exceeds: 0, meets: 0, approaches: 0, missing: 0 };
  filtered.forEach(ind => {
    if(!ind.latest_status) return;
    const s = ind.latest_status.toLowerCase();
    if(s.includes('exceeds')) statusCounts.exceeds++;
    else if(s.includes('meets')) statusCounts.meets++;
    else if(s.includes('approaches')) statusCounts.approaches++;
    else if(s.includes('missing')) statusCounts.missing++;
  });

  ['exceeds','meets','approaches','missing'].forEach(s => {
    if (activeStatus === 'all' || activeStatus === s) {
      const card = document.createElement('div');
      card.className = `summary-card ${s} ${activeStatus === s ? 'selected' : ''}`;
      card.onclick = () => {
        const btn = document.querySelector(`[data-status="${s}"]`);
        setStatusFilter(activeStatus === s ? 'all' : s, activeStatus === s ? document.querySelector('[data-status="all"]') : btn);
      };
      card.innerHTML = `<div class="summary-num">${statusCounts[s]}</div>
                        <div class="summary-label">${s.charAt(0).toUpperCase() + s.slice(1)} Minimum Req.</div>`;
      grid.appendChild(card);
    }
  });

  const dims = {};
  filtered.forEach(ind => {
    if (!dims[ind.dimension]) dims[ind.dimension] = [];
    dims[ind.dimension].push(ind);
  });

  Object.keys(dims).sort().forEach(dimName => {
    const section = document.createElement('section');
    section.className = 'dim-section';
    
    let sectionHtml = `<div class="dim-section-header">
      <div>
        <h3 class="dim-section-name">Dimension ${dimName}</h3>
      </div>
    </div>`;
    
    dims[dimName].forEach(ind => {
      const meta = PI_META[ind.pi_id] || { title: ind.indicator_name, summary: "Details not provided.", criteria: [] };
      const pillClass = ind.latest_status ? `pill-${getStatusClass(ind.latest_status)}` : 'pill-not-assessed';
      const cleanId = ind.pi_id.replace(/\s+/g, '-').toLowerCase();

      // Historical Status Dots Generation
      let dotsHtml = `<div class="history-dots" title="Historical Performance: 2022 to 2025">`;
      [ind.status_2022, ind.status_2023, ind.status_2024, ind.status_2025].forEach((st, idx) => {
         dotsHtml += `<div class="h-dot ${getStatusClass(st)}" title="${2022 + idx}: ${st || 'Not Assessed'}"></div>`;
      });
      dotsHtml += `</div>`;

      let criteriaHtml = '';
      if (meta.criteria && meta.criteria.length > 0) {
        const levels = { 'Approaches': [], 'Meets': [], 'Exceeds': [] };
        meta.criteria.forEach(c => { if(levels[c.level]) levels[c.level].push(c); });
        
        criteriaHtml = `<div class="criteria-section">
          <div class="criteria-title">Criteria Requirements</div>
          <div class="criteria-levels">`;
          
        ['Approaches', 'Meets', 'Exceeds'].forEach(lvl => {
          if (levels[lvl].length > 0) {
            criteriaHtml += `<div class="criteria-level level-${lvl.toLowerCase()}">
              <div class="criteria-level-header">${lvl} Minimum Requirements</div>
              <ul class="criteria-list">
                ${levels[lvl].map(c => `
                  <li class="criteria-item">
                    <div class="criteria-check ${c.met ? 'check-met' : 'check-unmet'}">${c.met ? '✓' : '—'}</div>
                    <span>${c.text}</span>
                  </li>
                `).join('')}
              </ul>
            </div>`;
          }
        });
        criteriaHtml += `</div></div>`;
      }

      sectionHtml += `<article class="indicator-detail" id="${cleanId}">
        <div class="ind-header">
          <div class="ind-header-left">
            <div class="ind-pi-label">${ind.pi_id}</div>
            <h4 class="ind-title">${meta.title}</h4>
            <p class="ind-summary">${meta.summary}</p>
          </div>
          <div class="ind-header-right">
            ${dotsHtml}
            <span class="status-pill ${pillClass}">${ind.latest_status || 'Not Assessed'}</span>
            <div class="ind-year">Assessed ${ind.last_assessed || 'N/A'}</div>
          </div>
        </div>
        ${criteriaHtml}
      </article>`;
    });

    section.innerHTML = sectionHtml;
    main.appendChild(section);
  });
}

function setDimFilter(dim, btn) {
  activeDim = dim;
  document.querySelectorAll('[data-dim]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateUrl(); render();
}

function setStatusFilter(status, btn) {
  activeStatus = status;
  document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateUrl(); render();
}

function clearFilters() {
  activeDim = 'all'; activeStatus = 'all';
  document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-dim="all"]').classList.add('active');
  document.querySelector('[data-status="all"]').classList.add('active');
  updateUrl(); render();
}

function readUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const dim    = params.get('dim');
  const status = params.get('status');

  if (dim && dim !== 'all') {
    const btn = document.querySelector(`[data-dim="${dim}"]`);
    if (btn) setDimFilter(dim, btn);
  }
  if (status && status !== 'all') {
    const btn = document.querySelector(`[data-status="${status}"]`);
    if (btn) setStatusFilter(status, btn);
  }
  
  if (window.location.hash) {
    setTimeout(() => {
      const el = document.querySelector(window.location.hash);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
    }, 100);
  }
}

function updateUrl() {
  const params = new URLSearchParams();
  if (activeDim    !== 'all') params.set('dim',    activeDim);
  if (activeStatus !== 'all') params.set('status', activeStatus);
  const qs = params.toString();
  history.replaceState(null, '', qs ? `?${qs}` : window.location.pathname);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (typeof Papa === 'undefined') {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js';
    s.onload = loadData;
    document.head.appendChild(s);
  } else {
    loadData();
  }
});
</script>
