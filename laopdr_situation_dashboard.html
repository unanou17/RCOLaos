<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lao PDR · Middle East Crisis · Situation Update No.2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');
:root{
  --un:#009EDB;--dark:#0A1628;--mid:#0D2240;
  --red:#E84C4C;--amber:#F5A623;--green:#27AE60;--teal:#1ABC9C;
  --text:#EEF2F7;--muted:#8A9AB5;--card:rgba(13,34,64,0.85);--border:rgba(0,158,219,0.2);
  --grid:rgba(0,158,219,0.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--dark);color:var(--text);font-size:13px;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:40px 40px}
header{background:linear-gradient(135deg,var(--mid),#071527);border-bottom:2px solid var(--un);
  padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  position:sticky;top:0;z-index:100;box-shadow:0 4px 30px rgba(0,0,0,.5)}
.hrow{display:flex;align-items:center;gap:12px}
.logo{width:42px;height:42px;background:var(--un);border-radius:50%;display:grid;place-items:center;
  font-size:9px;font-weight:700;color:#fff;text-align:center;line-height:1.15;flex-shrink:0}
.htitle h1{font-size:14px;font-weight:700}
.htitle p{font-size:10px;color:var(--muted);margin-top:1px}
.badge{background:rgba(0,158,219,.15);border:1px solid var(--un);border-radius:4px;padding:3px 9px;
  font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--un)}
#ts{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
.btn{border:none;border-radius:4px;padding:5px 12px;color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans',sans-serif}
.btn-blue{background:var(--un)}.btn-ghost{background:transparent;border:1px solid var(--muted);color:var(--muted)}.btn:hover{opacity:.85}

/* STATUS */
.srow{display:flex;align-items:center;gap:8px;padding:8px 18px;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:3px 10px;font-size:10px;font-family:'IBM Plex Mono',monospace}
.chip.ok{border-color:rgba(39,174,96,.4);color:var(--green)}
.chip.err{border-color:rgba(232,76,76,.4);color:var(--red)}
.chip.loading{border-color:rgba(0,158,219,.4);color:var(--un)}
.chip.warn{border-color:rgba(245,166,35,.4);color:var(--amber)}

/* PROGRESS */
.prog-wrap{padding:0 18px 6px;display:none}
.prog-wrap.show{display:block}
.prog-bar{height:3px;background:rgba(0,158,219,0.15);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--un);border-radius:2px;width:0;transition:width .4s ease}
.prog-lbl{font-size:9px;color:var(--muted);margin-top:3px;font-family:'IBM Plex Mono',monospace}

/* KPIs */
.dash{padding:10px 18px 22px;display:grid;gap:12px}
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:9px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:13px 15px;
  backdrop-filter:blur(8px);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.red::before{background:var(--red)}.kpi.amber::before{background:var(--amber)}
.kpi.green::before{background:var(--green)}.kpi.blue::before{background:var(--un)}.kpi.teal::before{background:var(--teal)}
.klbl{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:5px}
.kval{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;line-height:1}
.kval.red{color:var(--red)}.kval.amber{color:var(--amber)}.kval.green{color:var(--green)}
.kval.blue{color:var(--un)}.kval.teal{color:var(--teal)}
.ksub{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.3}
.ksrc{font-size:9px;color:rgba(138,154,181,.5);margin-top:5px}
.ksrc a{color:inherit;text-decoration:underline}
.ldot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:4px;animation:pulse 2s infinite}
.sdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--un);margin-right:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* CHARTS */
.cgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:12px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:15px;backdrop-filter:blur(8px)}
.ctitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.csub{font-size:10px;color:var(--muted);margin-bottom:10px}
.csrc{font-size:9px;color:rgba(138,154,181,.5);margin-top:8px;line-height:1.4}
.csrc a{color:var(--un);text-decoration:none}.csrc a:hover{text-decoration:underline}
canvas{max-height:200px}

/* ALERTS */
.alerts{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:9px}
.ac{background:var(--card);border:1px solid var(--border
